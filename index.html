    <title>シフト帳</title>
    <style>
    * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
        -webkit-tap-highlight-color: transparent
    }

    html, body {
        height: 100%;
        width: 100%;
        font-family: -apple-system, 'Hiragino Sans', sans-serif;
        background: #f2f2f7;
        overflow: hidden
    }

    #app {
        width: 100%;
        height: 100%;
        display: flex;
        flex-direction: column;
        position: relative;
        overflow: hidden
    }

    .screen {
        position: absolute;
        inset: 0;
        display: flex;
        flex-direction: column;
        opacity: 0;
        pointer-events: none;
        transition: opacity .2s
    }

    .screen.active {
        opacity: 1;
        pointer-events: all
    }

    .safe-top {
        height: env(safe-area-inset-top, 44px);
        min-height: 44px;
        flex-shrink: 0
    }

    .safe-bottom {
        height: env(safe-area-inset-bottom, 20px);
        flex-shrink: 0
    }

    .sbar {
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: 0 20px 4px;
        flex-shrink: 0
    }

    .stime {
        font-size: 15px;
        font-weight: 700;
        color: #111
    }

    .sicons {
        font-size: 13px;
        color: #111
    }

    .tabbar {
        flex-shrink: 0;
        background: rgba(242, 242, 247, .92);
        backdrop-filter: blur(20px);
        -webkit-backdrop-filter: blur(20px);
        border-top: 1px solid #d8d8dc;
        display: flex;
        justify-content: space-around;
        align-items: flex-start;
        padding-top: 10px;
        padding-bottom: env(safe-area-inset-bottom, 8px);
        position: relative;
        z-index: 10
    }

    .tbb {
        flex: 1;
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 3px;
        background: none;
        border: none;
        cursor: pointer;
        padding: 0 0 4px
    }

    .tbi {
        font-size: 23px;
        line-height: 1
    }

    .tbl {
        font-size: 10px;
        color: #8E8E93;
        font-weight: 500
    }

    .tbb.active .tbl {
        color: #007AFF;
        font-weight: 600
    }

    .scroll {
        flex: 1;
        overflow-y: auto;
        -webkit-overflow-scrolling: touch
    }

    .scroll::-webkit-scrollbar {
        display: none
    }

    .sl {
        font-size: 12px;
        font-weight: 600;
        color: #888;
        text-transform: uppercase;
        letter-spacing: .05em;
        padding: 0 4px;
        margin-bottom: 6px
    }

    .sw {
        margin-bottom: 14px
    }

    .card {
        background: #fff;
        border-radius: 14px;
        overflow: hidden
    }

    .crow {
        display: flex;
        align-items: center;
        padding: 13px 16px;
        gap: 12px;
        border-top: 1px solid #f3f3f3
    }

    .crow:first-child {
        border-top: none
    }

    .rl {
        font-size: 15px;
        color: #111;
        flex: 1
    }

    .rv {
        font-size: 15px;
        color: #007AFF;
        font-weight: 500
    }

    .ri {
        font-size: 18px;
        width: 26px;
        text-align: center;
        flex-shrink: 0
    }

    .bg-shukuchoku {
        background:#FF3B30
    }

    .bg-nichoku {
        background:#FF9500
    }

    .bg-oncall1 {
        background:#007AFF
    }

    .bg-oncall2 {
        background:#5856D6
    }

    .bg-golf {
        background:#34C759
    }

    .bg-gakkai {
        background:#AF52DE
    }

    .bg-kyuka {
        background:#30B0C7
    }

    .bg-free {
        background: #8E8E93
    }

    .tog {
        width: 48px;
        height: 28px;
        border-radius: 14px;
        background: #e5e5ea;
        position: relative;
        cursor: pointer;
        transition: background .2s;
        flex-shrink: 0
    }

    .tog.on {
        background: #34C759
    }

    .tth {
        width: 24px;
        height: 24px;
        border-radius: 50%;
        background: #fff;
        position: absolute;
        top: 2px;
        left: 2px;
        box-shadow: 0 1px 4px rgba(0, 0, 0, .25);
        transition: left .2s
    }

    .tog.on .tth {
        left: 22px
    }/* HOME */

    .tcard {
        border-radius: 20px;
        padding: 18px;
        display: flex;
        flex-direction: column;
        gap: 10px;
        margin-bottom: 14px
    }

    .tch {
        display: flex;
        align-items: center;
        justify-content: space-between
    }

    .tch .lbl {
        font-size: 12px;
        font-weight: 600;
        color: rgba(255, 255, 255, .7);
        text-transform: uppercase;
        letter-spacing: .06em
    }

    .tch .dt {
        font-size: 12px;
        color: rgba(255, 255, 255, .55);
        font-weight: 600
    }

    .ter {
        display: flex;
        align-items: center;
        gap: 12px;
        background: rgba(255, 255, 255, .15);
        border-radius: 14px;

    <script>
    // DATA
    const SK = 'shiftApp_events';
    function ldEv() {
        try {
            return JSON.parse(localStorage.getItem(SK)) || {};
        } catch (e) {
            return {};
        }
    }
    function svEv(ev) {
        localStorage.setItem(SK, JSON.stringify(ev));
    }
    if (!localStorage.getItem(SK)) {
        svEv({});
    }
    // CLOCK
    function updClk() {
        const t = new Date(),
            s = t.getHours() + ':' + String(t.getMinutes()).padStart(2, '0');
        ['ch', 'cc', 'ca'].forEach(i => {
            const e = document.getElementById(i);
            if (e)
                e.textContent = s;
        });
    }
    updClk();
    setInterval(updClk, 15000);
    // TABS
    const WD = ['日', '月', '火', '水', '木', '金', '土'];
    const GRAD = {
        shukuchoku: 'linear-gradient(145deg,#FF3B30,#c0392b)',
        nichoku: 'linear-gradient(145deg,#FF9500,#e67e00)',
        oncall1: 'linear-gradient(145deg,#007AFF,#005ecb)',
        oncall2: 'linear-gradient(145deg,#5856D6,#3d3aad)',

    function showTab(id, idx) {
        document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
        document.getElementById(id).classList.add('active');
        document.querySelectorAll('.tbb').forEach((b, i) => b.classList.toggle('active', i % 3 === idx));
        if (id === 'home') {
            renderHome();
        }
        if (id === 'calendar') {
            initSwipe();
            renderPages();
        }
    }
    // HOME
    function renderHome() {
        const now = new Date();
        const ev = ldEv();
        const todayKey = `${now.getFullYear()}-${now.getMonth() + 1}-${now.getDate()}`;
        const wd = WD[now.getDay()];
        const h = now.getHours();
        const greet = h < 12 ? 'おはようございます' : h < 18 ? 'こんにちは' : 'こんばんは';

        // ヘッダー
        const months = ['1月', '2月', '3月', '4月', '5月', '6月', '7月', '8月', '9月', '10月', '11月', '12月'];
        const WEEKDAYS_FULL = ['日曜日', '月曜日', '火曜日', '水曜日', '木曜日', '金曜日', '土曜日'];
        document.getElementById('homeHeaderDate').textContent = `${now.getFullYear()}年${months[now.getMonth()]}${now.getDate()}日（${wd}）`;
        document.getElementById('ch').textContent = `${String(h).padStart(2, '0')}:${String(now.getMinutes()).padStart(2, '0')}`;

        // 今日の予定カード
        const te = ev[todayKey] || [];
        const g = te.length ? GRAD[te[0].cat] || GRAD.free : 'linear-gradient(145deg,#636366,#48484a)';
        const todayRows = te.length
        ? te.map(e => `
      <div style="display:flex;align-items:center;gap:12px;background:rgba(255,255,255,0.18);border-radius:12px;padding:12px 14px;margin-bottom:8px">
        <div style="width:40px;height:40px;border-radius:12px;background:rgba(255,255,255,0.25);display:flex;align-items:center;justify-content:center;font-size:20px;flex-shrink:0">${
        e.icon || '📌'}</div>
        <div style="flex:1">
          <div style="font-size:17px;font-weight:700;color:#fff;letter-spacing:-.3px">${
        e.label}</div>
          <div style="font-size:12px;color:rgba(255,255,255,0.72);margin-top:2px">${e.timeStr || '終日'}</div>
        </div>
      </div>`

        ).join('')
        : '<div style="text-align:center;color:rgba(255,255,255,0.5);font-size:14px;padding:12px 0">予定なし</div>';

        document.getElementById('todayFixed').innerHTML =
        `<div style="background:${g};border-radius:20px;padding:16px 16px 8px">
      <div style="font-size:11px;font-weight:700;color:rgba(255,255,255,0.65);text-transform:uppercase;letter-spacing:.08em;margin-bottom:10px">今日の予定</div>
      ${
        todayRows}
    </div>`
        ;

        // 予定リスト（今後・以前）
        const futureItems = [];
        for (let i = 1; i <= 180; i++) {
            const d = new Date(now.getFullYear(), now.getMonth(), now.getDate() + i);
            const k = `${d.getFullYear()}-${d.getMonth() + 1}-${d.getDate()}`;
            (ev[k] || []).forEach(e => futureItems.push({
                d,
                e
            }));
            if (futureItems.length >= 60)
                break;
        }
        const pastTmp = [];
        for (let i = 180; i >= 1; i--) {
            const d = new Date(now.getFullYear(), now.getMonth(), now.getDate() - i);
            const k = `${d.getFullYear()}-${d.getMonth() + 1}-${d.getDate()}`;
            (ev[k] || []).forEach(e => pastTmp.push({
                d,
                e
            }));
        }
        const pastItems = pastTmp.slice(-30);

        const makeRow = (d, e, past=false) => {
            const dw = d.getDay(),
                dc = dw === 0 ? 'sun' : dw === 6 ? 'sat' : '';
            const holi = isHoliday(d.getFullYear(), d.getMonth() + 1, d.getDate());
            const isRed = dw === 0 || !!holi;
            const dateColor = isRed ? '#FF3B30' : dw === 6 ? '#007AFF' : '#111';
            return `<div style="display:flex;align-items:center;gap:12px;padding:10px 14px;background:#fff;border-radius:12px;margin-bottom:6px;${past ? 'opacity:0.45' : ''}">
      <div style="text-align:center;width:38px;flex-shrink:0">
        <div style="font-size:10px;color:${
            dateColor};font-weight:500">${WD[dw]}${holi ? '🎌' : ''}</div>
        <div style="font-size:19px;font-weight:700;color:${dateColor};letter-spacing:-0.5px;line-height:1.2">${d.getDate()}</div>
        <div style="font-size:10px;color:#aaa">${d.getMonth() + 1}月</div>
      </div>
      <div style="width:1px;height:36px;background:#f0f0f0;flex-shrink:0"></div>
      <div style="flex:1">
        <div style="font-size:15px;font-weight:600;color:#111">${


            e.label}</div>
        <div style="font-size:12px;color:#888;margin-top:2px">${e.timeStr || '終日'}</div>
      </div>
      <div style="width:10px;height:10px;border-radius:50%;background:${
            e.color};flex-shrink:0"></div>
    </div>`
            ;
        };

        const scroller = document.getElementById('homeScroll');
        const pastHTML = pastItems.length
        ? `<div style="margin-bottom:12px">
        <button onclick="togglePast()" id="pastToggleBtn"
          style="width:100%;padding:10px;background:rgba(0,0,0,0.04);border:none;border-radius:12px;font-size:12px;font-weight:600;color:#888;cursor:pointer;text-align:center">
          ▲ 以前の予定（${

        pastItems.length}件）
        </button>
        <div id="pastSection" style="display:none;margin-top:6px">
          ${

        pastItems.map(({d, e}) => makeRow(d, e, true)).join('')}
        </div>
      </div>`

        : '';

        const futureHTML = futureItems.length
        ? `<div style="font-size:11px;font-weight:700;color:#888;text-transform:uppercase;letter-spacing:.08em;margin-bottom:8px;padding-left:4px">今後の予定</div>`
        + futureItems.map(({d, e}) => makeRow(d, e, false)).join('')
        : '<div style="text-align:center;color:#bbb;font-size:14px;padding:30px 0">今後の予定なし</div>';

        scroller.innerHTML = pastHTML + futureHTML;
    }

    function togglePast() {
        const sec = document.getElementById('pastSection');
        const btn = document.getElementById('pastToggleBtn');
        if (sec.style.display === 'none') {
            sec.style.display = 'block';
            btn.textContent = '▼ 以前の予定を隠す';
        } else {
            sec.style.display = 'none';
            btn.textContent = btn.textContent.replace('▼', '▲').replace('隠す', `（${sec.querySelectorAll('div[style]').length}件）`);
        }
    }

    // CALENDAR SWIPE
    let cY = new Date().getFullYear(),
        cM = new Date().getMonth() + 1,
        swInit = false,
        swX = 0,
        swY = 0,
        swing = false,
        swDx = 0;
    function initSwipe() {
        if (swInit)
            return;
        swInit = true;
        const o = document.getElementById('cso');
        o.addEventListener('touchstart', e => {
            swX = e.touches[0].clientX;
            swY = e.touches[0].clientY;
            swing = true;
            swDx = 0;
            document.getElementById('cst').style.transition = 'none';
        }, {
            passive: true
        });
        o.addEventListener('touchmove', e => {
            if (!swing)
                return;
            swDx = e.touches[0].clientX - swX;
            const dy = Math.abs(e.touches[0].clientY - swY);
            if (Math.abs(swDx) < dy) {
                swing = false;
                return;
            }
            const w = o.offsetWidth;
            document.getElementById('cst').style.transform = `translateX(${-w + swDx}px)`;
        }, {
            passive: true
        });
        o.addEventListener('touchend', () => {
            if (!swing)
                return;
            swing = false;
            const o2 = document.getElementById('cso'),
                w = o2.offsetWidth,
                t = document.getElementById('cst');
            t.style.transition = 'transform .3s cubic-bezier(.4,0,.2,1)';
            if (swDx < -50)
                calChM(1);
            else if (swDx > 50)
                calChM(-1);
            else
                t.style.transform = `translateX(${-w}px)`;
        });
    }
    function calChM(delta) {
        cM += delta;
        if (cM > 12) {
            cM = 1;
            cY++;
        }
        if (cM < 1) {
            cM = 12;
            cY--;
        }
        renderPages();
        const o = document.getElementById('cso'),
            t = document.getElementById('cst');
        t.style.transition = 'none';
        requestAnimationFrame(() => {
            t.style.transform = `translateX(${-o.offsetWidth}px)`;
        });
    }
    function renderPages() {
        document.getElementById('caly').textContent = cY;
        document.getElementById('calm').textContent = cM + '月';
        [-1, 0, 1].forEach((off, i) => {
            let m = cM + off,
                y = cY;
            if (m > 12) {
                m -= 12;
                y++;
            }
            if (m < 1) {
                m += 12;
                y--;
            }
            renderOnePage(document.getElementById('cp' + i), y, m);
        });
        const o = document.getElementById('cso'),
            t = document.getElementById('cst');
        t.style.transition = 'none';
        requestAnimationFrame(() => {
            t.style.transform = `translateX(${-o.offsetWidth}px)`;
        });
    }
    function renderOnePage(cont, y, m) {
        const ev = ldEv(),
            now = new Date(),
            fd = new Date(y, m - 1, 1).getDay(),
            dim = new Date(y, m, 0).getDate(),
            pdim = new Date(y, m - 1, 0).getDate();
        let cells = [];
        for (let i = fd - 1; i >= 0; i--)
            cells.push({
                day: pdim - i,
                oth: true
            });
        for (let d = 1; d <= dim; d++)
            cells.push({
                day: d,
                oth: false
            });
        while (cells.length % 7)
            cells.push({
                day: cells.length - dim - fd + 1,
                oth: true
            });
        let h = '<div class="cgw">';
        for (let w = 0; w < cells.length / 7; w++) {
            h += '<div class="wr">';
            for (let d = 0; d < 7; d++) {
                const c = cells[w * 7 + d];
                const km = c.oth ? (w === 0 ? m - 1 : m + 1) : m,
                    ky = km < 1 ? y - 1 : km > 12 ? y + 1 : y,
                    kfm = km < 1 ? 12 : km > 12 ? 1 : km,
                    key = `${ky}-${kfm}-${c.day}`;
                const evs = ev[key] || [],
                    isT = !c.oth && c.day === now.getDate() && y === now.getFullYear() && m === now.getMonth() + 1;
                const holi = !c.oth ? isHoliday(y, m, c.day) : null;
                let nc = 'dn';
                if (isT)
                    nc += ' today';
                else if (c.oth)
                    nc += ' oth';
                else if (holi || d === 0)
                    nc += ' sn';
                else if (d === 6)
                    nc += ' san';
                h += `<div class="dc" onclick="calCellTap(event,'${key}',${y},${m},${c.day})" >`
                + `<div class="${nc}">${c.day}</div>`
                + (holi ? `<div class="ech" style="background:#FF3B30;font-size:7px">${holi}</div>` : '')
                + `<div class="ec">${evs.map(e => `<div class="ech" style="background:${e.color}">${e.label}</div>`).join('')}</div>`
                + `</div>`;
            }
            h += '</div>';
        }
        h += '</div>';
        cont.innerHTML = h;
    }
    // 日本の祝日
    const JP_HOLIDAYS = {
        // 2025
        '2025-1-1': '元日',
        '2025-1-13': '成人の日',
        '2025-2-11': '建国記念の日',
        '2025-2-23': '天皇誕生日',

        // 2026

        '2026-2-23': '天皇誕生日',

        '2026-5-4': 'みどりの日',
        '2026-5-5': 'こどもの日',

        '2026-7-20': '海の日',
        '2026-8-11': '山の日',

        '2026-9-22': '国民の休日',
        '2026-9-23': '秋分の日',
        '2026-10-12': 'スポーツの日',
        '2026-11-3': '文化の日',
        '2026-11-23': '勤労感謝の日',
        // 2027
        '2027-1-1': '元日',
        '2027-1-11': '成人の日',
        '2027-2-11': '建国記念の日',
        '2027-2-23': '天皇誕生日',
        '2027-3-21': '春分の日',

        '2027-11-3': '文化の日',
        '2027-11-23': '勤労感謝の日',
    };
    function isHoliday(y, m, d) {
        return JP_HOLIDAYS[`${y}-${m}-${d}`] || null;
    }

    // CAL MODAL
    let lastTapTime = 0,
        lastTapKey = '';

    function calCellTap(e, key, y, m, d) {
        const now = Date.now();
        // ダブルタップ判定（500ms以内に同じ日を2回タップ）
        if (now - lastTapTime < 500 && lastTapKey === key) {
            closeCalModalDirect();
            lastTapTime = 0;
            lastTapKey = '';
            return;
        }
        lastTapTime = now;
        lastTapKey = key;
        openCalModal(key, y, m, d);
    }

    function openCalModal(key, y, m, d) {
        const ev = ldEv(),
            evs = ev[key] || [];
        const dow = new Date(y, m - 1, d).getDay();
        const wdStr = ['日', '月', '火', '水', '木', '金', '土'][dow];
        const holiName = isHoliday(y, m, d);
        document.getElementById('calModalDate').textContent = `${m}月${d}日（${wdStr}）${holiName ? ' 🎌' + holiName : ''}`;
        const body = document.getElementById('calModalBody');
        if (!evs.length) {
            body.innerHTML = '<div class="cal-modal-empty">予定なし</div>';
        } else {
            body.innerHTML = evs.map(e => `
      <div class="cal-modal-ev">
        <div class="cal-modal-bar" style="background:${
            e.color}"></div>
        <div class="cal-modal-info">
          <div class="cal-modal-name">${
            e.icon || '📌'} ${e.label}</div>
          <div class="cal-modal-time">${e.timeStr || '終日'}${e.memo ? ' · ' + e.memo : ''}</div>
        </div>
        <button onclick="delEvFromModal('${
            key}',${evs.indexOf(e)})" style="width:28px;height:28px;border-radius:50%;background:#FF3B30;border:none;color:#fff;font-size:16px;font-weight:700;cursor:pointer;flex-shrink:0">×</button>
      </div>`
            ).join('');
        }
        document.getElementById('calModal').classList.add('show');
    }

    function closeCalModal(e) {
        // オーバーレイ自体をタップしたときだけ閉じる
        if (e.target === document.getElementById('calModal'))
            closeCalModalDirect();
    }

    function closeCalModalDirect() {
        document.getElementById('calModal').classList.remove('show');
    }

    function delEvFromModal(key, idx) {
        const ev = ldEv();
        if (ev[key]) {
            ev[key].splice(idx, 1);
            if (!ev[key].length)
                delete ev[key];
            svEv(ev);
        }
        toast('削除しました');
        closeCalModalDirect();
        renderPages();
        renderHome();
    }

    // ADD
    let aC = null,
        aCol = '#007AFF',
        aIco = '📌',
        sDates = new Set(),
        pY = new Date().getFullYear(),
        pM = new Date().getMonth() + 1;
    const MN = ['1月', '2月', '3月', '4月', '5月', '6月', '7月', '8月', '9月', '10月', '11月', '12月'];
    function selCat(el) {
        document.querySelectorAll('.ci').forEach(c => c.classList.remove('sel'));
        el.classList.add('sel');
        // 必ず変数を先に更新してからUIを操作
        aC = el.dataset.cat;
        aCol = el.dataset.color;
        aIco = el.dataset.icon;
        const iF = (aC === 'free');
        document.getElementById('freeSec').style.display = iF ? 'block' : 'none';
        document.getElementById('dsl').textContent = iF ? '③ 日付（複数選択可）' : '② 日付（複数選択可）';
        document.getElementById('tsl').textContent = iF ? '④ 時間（任意）' : '③ 時間（任意）';
        document.getElementById('msl').textContent = iF ? '⑤ メモ' : '④ メモ';
        if (iF)
            document.getElementById('fti').value = '';
        renderElist();
        renderPCal();
        updSvb();
    }
    function renderElist() {
        const ev = ldEv(),
            items = [];
        Object.entries(ev).forEach(([k, evs]) => evs.forEach((e, idx) => {
            if (e.cat === aC) {
                const [y, m, d] = k.split('-');
                items.push({
                    k,
                    idx,
                    e,
                    ds: `${m}/${d}（${WD[new Date(+y, +m - 1, +d).getDay()]}）`
                });
            }
        }));
        items.sort((a, b) => {
            const [ay, am, ad] = a.k.split('-').map(Number),
                [by, bm, bd] = b.k.split('-').map(Number);
            return new Date(ay, am - 1, ad) - new Date(by, bm - 1, bd);
        });
        const w = document.getElementById('elistWrap');
        if (!items.length) {
            w.innerHTML = '';
            return;
        }
        w.innerHTML = '<div style="font-size:12px;font-weight:600;color:#888;text-transform:uppercase;letter-spacing:.05em;padding:10px 4px 6px">登録済みの予定</div><div class="elist">' + items.map(it => `<div class="eitem"><div class="edot" style="background:${it.e.color}"></div><div class="einf">${it.ds}<div class="esub">${it.e.label}${it.e.timeStr ? ' · ' + it.e.timeStr : ''}</div></div><button class="delbtn" onclick="delEv('${it.k}',${it.idx})">×</button></div>`).join('') + '</div>';
    }
    function delEv(k, idx) {
        const ev = ldEv();
        if (ev[k]) {
            ev[k].splice(idx, 1);
            if (!ev[k].length)
                delete ev[k];
            svEv(ev);
        }
        toast('削除しました');
        renderElist();
        renderPCal();
    }
    function pChM(d) {
        pM += d;
        if (pM > 12) {
            pM = 1;
            pY++;
        }
        if (pM < 1) {
            pM = 12;
            pY--;
        }
        renderPCal();
    }
    function renderPCal() {
        document.getElementById('pml').textContent = `${pY}年${MN[pM - 1]}`;
        const g = document.getElementById('pg');
        g.innerHTML = '';
        const fd = new Date(pY, pM - 1, 1).getDay(),
            dim = new Date(pY, pM, 0).getDate(),
            now = new Date();
        for (let i = 0; i < fd; i++) {
            const e = document.createElement('div');
            e.className = 'pc emp';
            g.appendChild(e);
        }
        for (let d = 1; d <= dim; d++) {
            const key = `${pY}-${pM}-${d}`,
                dow = new Date(pY, pM - 1, d).getDay(),
                cell = document.createElement('div');
            let cls = 'pc';
            if (dow === 0)
                cls += ' sunc';
            if (dow === 6)
                cls += ' satc';
            if (d === now.getDate() && pY === now.getFullYear() && pM === now.getMonth() + 1)
                cls += ' todc';
            if (sDates.has(key)) {
                cls += ' selc';
                cell.style.background = aCol;
            }
            cell.className = cls;
            cell.textContent = d;
            cell.onclick = () => {
                if (sDates.has(key)) {
                    sDates.delete(key);
                    cell.classList.remove('selc');
                    cell.style.background = '';
                } else {
                    sDates.add(key);
                    cell.classList.add('selc');
                    cell.style.background = aCol;
                }
                updDs();
                updSvb();
            };
            g.appendChild(cell);
        }
    }
    function updDs() {
        const el = document.getElementById('ds');
        if (!sDates.size) {
            el.innerHTML = '日付を選択してください';
            return;
        }
        const s = Array.from(sDates).sort((a, b) => {
            const [ay, am, ad] = a.split('-').map(Number),
                [by, bm, bd] = b.split('-').map(Number);
            return new Date(ay, am - 1, ad) - new Date(by, bm - 1, bd);
        });
        el.innerHTML = `<span>${s.map(k => {const [y, m, d] = k.split('-');return `${m}/${d}(${WD[new Date(+y, +m - 1, +d).getDay()]})`;}).join('・')}</span>`;
    }
    function togTime() {
        const t = document.getElementById('ttog'),
            r = document.getElementById('trows');
        t.classList.toggle('on');
        r.style.display = t.classList.contains('on') ? 'block' : 'none';
    }
    function updSvb() {
        if (!aC) {
            document.getElementById('svb').classList.remove('active');
            return;
        }
        const isFree = (aC === 'free');
        const titleOk = !isFree || (document.getElementById('fti').value.trim().length > 0);
        const dateOk = sDates.size > 0;
        document.getElementById('svb').classList.toggle('active', titleOk && dateOk);
    }
    function saveEv() {
        if (!document.getElementById('svb').classList.contains('active'))
            return;
        if (!aC || sDates.size === 0)
            return;
        const ev = ldEv();
        const isFree = (aC === 'free');
        const ftiEl = document.getElementById('fti');
        const label = isFree ? (ftiEl ? ftiEl.value.trim() : 'フリー') : (document.querySelector('.ci.sel') ? document.querySelector('.ci.sel').dataset.label : aC);
        const ton = document.getElementById('ttog').classList.contains('on');
        const ts = ton ? (document.getElementById('st').value + '〜' + document.getElementById('et').value) : null;
        const memo = document.getElementById('mi').value.trim() || null;
        sDates.forEach(k => {
            if (!ev[k])
                ev[k] = [];
            ev[k].push({
                cat: aC,
                label: label,
                icon: aIco,
                color: aCol,
                timeStr: ts,
                memo: memo
            });
        });
        svEv(ev);
        // Googleカレンダーに追加
        if (gcalToken) {
            gcalAddEvent(label, aIco, aCol, Array.from(sDates), ts, memo)
            .then(() => toast('保存しました ✓（Googleカレンダーにも追加）'))
            .catch(() => toast('保存しました ✓'));
        } else {
            toast('保存しました ✓');
        }
        resetAdd();
        showTab('home', 0);
    }
    function resetAdd() {
        document.querySelectorAll('.ci').forEach(c => c.classList.remove('sel'));
        aC = null;
        aCol = '#007AFF';
        aIco = '📌';
        sDates.clear();
        document.getElementById('freeSec').style.display = 'none';
        document.getElementById('fti').value = '';
        document.getElementById('elistWrap').innerHTML = '';
        document.getElementById('dsl').textContent = '② 日付（複数選択可）';
        document.getElementById('tsl').textContent = '③ 時間（任意）';
        document.getElementById('msl').textContent = '④ メモ';
        document.getElementById('ttog').classList.remove('on');
        document.getElementById('trows').style.display = 'none';
        document.getElementById('mi').value = '';
        document.getElementById('svb').classList.remove('active');
        pY = new Date().getFullYear();
        pM = new Date().getMonth() + 1;
        renderPCal();
        updDs();
        document.getElementById('addScroll').scrollTop = 0;
    }
    function toast(msg) {
        const t = document.getElementById('toast');
        t.textContent = msg;
        t.classList.add('show');
        setTimeout(() => t.classList.remove('show'), 2000);
    }
    // EXPORT / IMPORT
    // EXPORT / IMPORT
    function exportData() {
        const ev = ldEv();
        const json = JSON.stringify(ev, null, 2);
        // iOS Safari対応: data URIで開く
        const dataUri = 'data:application/json;charset=utf-8,' + encodeURIComponent(json);
        const a = document.createElement('a');
        a.href = dataUri;
        a.download = 'shift_backup.json';
        document.body.appendChild(a);
        a.click();
        document.body.removeChild(a);
        toast('エクスポートしました ✓');
    }

    function importData(e) {
        const file = e.target.files[0];
        if (!file)
            return;
        const reader = new FileReader();
        reader.onload = ev => {
            try {
                const data = JSON.parse(ev.target.result);
                // 既存データとマージ
                const existing = ldEv();
                Object.entries(data).forEach(([key, evs]) => {
                    if (!existing[key])
                        existing[key] = [];
                    // 重複チェックしながら追加
                    evs.forEach(newEv => {
                        const dup = existing[key].some(e => e.cat === newEv.cat && e.label === newEv.label);
                        if (!dup)
                            existing[key].push(newEv);
                    });
                });
                svEv(existing);
                renderHome();
                renderPages();
                toast('インポートしました ✓');
            } catch (err) {
                toast('ファイルが正しくありません');
            }
        };
        reader.readAsText(file);
        e.target.value = ''; // リセット
    }

    // GOOGLE CALENDAR
    const GC_CLIENT_ID = '875090453121-7s72jggb84m87tn3omlorhht9ujvnsn9.apps.googleusercontent.com';
    const GC_SCOPE = 'https://www.googleapis.com/auth/calendar.events';
    const GC_CAL_ID = 'primary';
    let gcalToken = null;
    let gcalInited = false;

    function gcalInit() {
        if (gcalInited)
            return;
        gcalInited = true;
        // 保存済みトークンを確認
        const saved = localStorage.getItem('gcal_token');
        if (saved) {
            gcalToken = JSON.parse(saved);
            gcalUpdateBtn(true);
        }
    }

    function gcalToggle() {
        if (gcalToken) {
            // 切断
            gcalToken = null;
            localStorage.removeItem('gcal_token');
            gcalUpdateBtn(false);
            toast('Googleカレンダーの連携を解除しました');
        } else {
            // 接続
            const client = google.accounts.oauth2.initTokenClient({
                client_id: GC_CLIENT_ID,
                scope: GC_SCOPE,
                callback: (resp) => {
                    if (resp.error) {
                        toast('連携に失敗しました');
                        return;
                    }
                    gcalToken = resp;
                    localStorage.setItem('gcal_token', JSON.stringify(resp));
                    gcalUpdateBtn(true);
                    toast('Googleカレンダーと連携しました ✓');
                },
            });
            client.requestAccessToken();
        }
    }

    function gcalUpdateBtn(connected) {
        const btn = document.getElementById('gcalBtn');
        const icon = document.getElementById('gcalBtnIcon');
        const text = document.getElementById('gcalBtnText');
        if (!btn)
            return;
        if (connected) {
            btn.className = 'gcal-btn connected';
            icon.textContent = '✓';
            text.textContent = 'Googleカレンダー連携中（タップで解除）';
        } else {
            btn.className = 'gcal-btn disconnected';
            icon.textContent = '📅';
            text.textContent = 'Googleカレンダーと連携する';
        }
    }

    async function gcalAddEvent(label, icon, color, dates, timeStr, memo) {
        if (!gcalToken)
            return;
        for (const key of dates) {
            const [y, m, d] = key.split('-').map(Number);
            let start,
                end;
            if (timeStr) {
                const parts = timeStr.split('〜');
                const startT = parts[0],
                    endT = parts[1] || '';
                const sH = startT.split(':')[0].padStart(2, '0');
                const sM = startT.split(':')[1] || '00';
                let eH = (endT.replace('翌', '') || startT).split(':')[0].padStart(2, '0');
                let eM = (endT.replace('翌', '') || startT).split(':')[1] || '00';
                const isNextDay = endT.includes('翌');
                const nd = isNextDay ? new Date(y, m - 1, d + 1) : new Date(y, m - 1, d);
                const ey = nd.getFullYear(),
                    em = String(nd.getMonth() + 1).padStart(2, '0'),
                    ed = String(nd.getDate()).padStart(2, '0');
                const ds = `${y}-${String(m).padStart(2, '0')}-${String(d).padStart(2, '0')}`;
                start = {
                    dateTime: `${ds}T${sH}:${sM}:00`,
                    timeZone: 'Asia/Tokyo'
                };
                end = {
                    dateTime: `${ey}-${em}-${ed}T${eH}:${eM}:00`,
                    timeZone: 'Asia/Tokyo'
                };
            } else {
                const ds = `${y}-${String(m).padStart(2, '0')}-${String(d).padStart(2, '0')}`;
                start = {
                    date: ds
                };
                const nd = new Date(y, m - 1, d + 1);
                end = {
                    date: `${nd.getFullYear()}-${String(nd.getMonth() + 1).padStart(2, '0')}-${String(nd.getDate()).padStart(2, '0')}`
                };
            }
            const event = {
                summary: `${icon} ${label}`,
                description: memo || '',
                start,
                end,
                reminders: {
                    useDefault: false,
                    overrides: [
                    {
                        method: 'popup',
                        minutes: 60 * 9
                    },
                    {
                        method: 'popup',
                        minutes: 60 * 34
                    }
                    ]
                }
            };
            try {
                await fetch(`https://www.googleapis.com/calendar/v3/calendars/primary/events`, {
                    method: 'POST',
                    headers: {
                        'Authorization': 'Bearer ' + gcalToken.access_token,
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify(event)
                });
            } catch (e) {
                console.error('gcal error:', e);
            }
        }
    }

    // INIT
    // 古いlocalStorageキャッシュをクリア（バージョン管理）
    const APP_VER = 'v3';
    if (localStorage.getItem('shiftApp_ver') !== APP_VER) {
        // バージョンが変わったらキャッシュクリアしない（データ保持）
        localStorage.setItem('shiftApp_ver', APP_VER);
    }
    gcalInit();
    renderHome();
    renderPages();
    renderPCal();
    </script>
